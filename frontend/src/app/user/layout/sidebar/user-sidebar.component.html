<aside class="sidebar" [class.collapsed]="collapsed" [class.mobile-open]="mobileOpen">
  <!-- Brand / header -->
  <div class="sidebar__brand">
    <!-- Desktop collapse toggle -->
    <button
      class="sidebar__toggle"
      type="button"
      (click)="toggleSidebar.emit()"
      aria-label="Toggle sidebar"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path
          d="M4 6H20M4 12H20M4 18H20"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
    </button>

    <div class="sidebar__logo" *ngIf="!collapsed">
      <div class="sidebar__mark">B</div>
      <div class="sidebar__text">
        <span class="sidebar__title">Boutique</span>
        <span class="sidebar__subtitle">Customer portal</span>
      </div>
    </div>

    <!-- Mobile close (X) button -->
    <button
      class="sidebar__close-mobile"
      type="button"
      (click)="closeSidebar.emit()"
      aria-label="Close menu"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path
          d="M18 6L6 18M6 6l12 12"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="sidebar__nav">
    <a
      *ngFor="let item of navItems"
      class="sidebar__link"
      [routerLink]="item.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: item.exact || false }"
      [attr.aria-label]="item.label"
      (click)="closeSidebar.emit()"
    >
      <span class="sidebar__icon" [ngSwitch]="item.icon">
        <svg *ngSwitchCase="'dashboard'" viewBox="0 0 24 24" fill="none">
          <path
            d="M4 10.5L12 4l8 6.5V20a1 1 0 0 1-1 1h-4.5v-6.5h-5V21H5a1 1 0 0 1-1-1v-9.5Z"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
        </svg>
        <svg *ngSwitchCase="'products'" viewBox="0 0 24 24" fill="none">
          <path
            d="M20 7.5 12 3 4 7.5v9L12 21l8-4.5v-9Z"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
          <path
            d="M12 12v9M4 7.5 12 12l8-4.5"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <svg *ngSwitchCase="'orders'" viewBox="0 0 24 24" fill="none">
          <path
            d="M6 6h15l-2 9H8L6 6ZM6 6 5.5 3.5H3"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <circle cx="9" cy="19" r="1.5" stroke="currentColor" stroke-width="1.8" />
          <circle cx="18" cy="19" r="1.5" stroke="currentColor" stroke-width="1.8" />
        </svg>
        <svg *ngSwitchCase="'messages'" viewBox="0 0 24 24" fill="none">
          <path
            d="M5 4h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H11l-5 4v-4H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
        </svg>
        <svg *ngSwitchCase="'customers'" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.8" />
          <path
            d="M4.5 20a7.5 7.5 0 0 1 15 0"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          />
        </svg>
        <svg *ngSwitchCase="'settings'" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
      <span class="sidebar__label" *ngIf="!collapsed">{{ item.label }}</span>
    </a>
  </nav>

  <!-- Footer -->
  <div class="sidebar__footer">
    <div class="sidebar__user" *ngIf="!collapsed">
      <div class="sidebar__avatar">{{ getUserInitials() }}</div>
      <div class="sidebar__user-info">
        <div class="sidebar__user-label">Signed in as</div>
        <div class="sidebar__user-email">
          {{ authService.getUser()?.email || 'Guest' }}
        </div>
      </div>
    </div>

    <button class="sidebar__logout" type="button" (click)="logout()">
      <span class="sidebar__icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path
            d="M17 16l4-4m0 0l-4-4m4 4H7"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M3 12v7a2 2 0 0 0 2 2h4M3 12V5a2 2 0 0 1 2-2h4"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          />
        </svg>
      </span>
      <span class="sidebar__label" *ngIf="!collapsed">Log out</span>
    </button>
  </div>
</aside>

<aside class="sidebar" [class.collapsed]="collapsed">
  <div class="sidebar__brand">
    <button
      class="sidebar__toggle"
      type="button"
      (click)="toggleSidebar.emit()"
      aria-label="Toggle sidebar"
    >
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M4 6H20M4 12H20M4 18H20"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
    </button>

    <div class="sidebar__logo">
      <div class="sidebar__mark">B</div>
      <div class="sidebar__text" *ngIf="!collapsed">
        <span class="sidebar__title">Boutique</span>
        <span class="sidebar__subtitle">Customer portal</span>
      </div>
    </div>
  </div>

  <nav class="sidebar__nav">
    <a
      *ngFor="let item of navItems"
      class="sidebar__link"
      [routerLink]="item.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: item.exact || false }"
      [attr.aria-label]="item.label"
    >
      <span class="sidebar__icon" [ngSwitch]="item.icon">
        <svg *ngSwitchCase="'dashboard'" viewBox="0 0 24 24" fill="none">
          <path
            d="M4 10.5L12 4l8 6.5V20a1 1 0 0 1-1 1h-4.5v-6.5h-5V21H5a1 1 0 0 1-1-1v-9.5Z"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
        </svg>
        <svg *ngSwitchCase="'products'" viewBox="0 0 24 24" fill="none">
          <path
            d="M20 7.5 12 3 4 7.5v9L12 21l8-4.5v-9Z"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
          <path
            d="M12 12v9"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          />
          <path
            d="M4 7.5 12 12l8-4.5"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
        </svg>
        <svg *ngSwitchCase="'orders'" viewBox="0 0 24 24" fill="none">
          <path
            d="M6 6h15l-2 9H8L6 6Z"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
          <path
            d="M6 6 5.5 3.5H3"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          />
          <circle
            cx="9"
            cy="19"
            r="1.5"
            stroke="currentColor"
            stroke-width="1.8"
          />
          <circle
            cx="18"
            cy="19"
            r="1.5"
            stroke="currentColor"
            stroke-width="1.8"
          />
        </svg>
        <svg *ngSwitchCase="'messages'" viewBox="0 0 24 24" fill="none">
          <path
            d="M5 4h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H11l-5 4v-4H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
        </svg>
        <svg *ngSwitchCase="'customers'" viewBox="0 0 24 24" fill="none">
          <circle
            cx="12"
            cy="8"
            r="3.5"
            stroke="currentColor"
            stroke-width="1.8"
          />
          <path
            d="M4.5 20a7.5 7.5 0 0 1 15 0"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          />
        </svg>
        <svg *ngSwitchCase="'settings'" viewBox="0 0 24 24" fill="none">
          <path
            d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z"
            stroke="currentColor"
            stroke-width="1.8"
          />
          <path
            d="M19.4 15a7.9 7.9 0 0 0 .1-6l-2 .2a6.2 6.2 0 0 0-1.1-1.8l.9-1.8a9 9 0 0 0-5.3-2.2l-.6 1.9a6.1 6.1 0 0 0-2 0L8.8 1.4A9 9 0 0 0 3.5 3.6l.9 1.8A6.2 6.2 0 0 0 3.3 7.2l-2-.2a7.9 7.9 0 0 0 .1 6l2-.2a6.2 6.2 0 0 0 1.1 1.8l-.9 1.8a9 9 0 0 0 5.3 2.2l.6-1.9a6.1 6.1 0 0 0 2 0l.6 1.9a9 9 0 0 0 5.3-2.2l-.9-1.8a6.2 6.2 0 0 0 1.1-1.8l2 .2Z"
            stroke="currentColor"
            stroke-width="1.2"
            stroke-linejoin="round"
          />
        </svg>
      </span>
      <span class="sidebar__label" *ngIf="!collapsed">{{ item.label }}</span>
    </a>
  </nav>

  <div class="sidebar__footer">
    <div class="sidebar__user" *ngIf="!collapsed">
      <div class="sidebar__avatar">{{ getUserInitials() }}</div>
      <div>
        <div class="sidebar__user-label">Signed in</div>
        <div class="sidebar__user-email">
          {{ authService.getUser()?.email || "Guest" }}
        </div>
      </div>
    </div>

    <button class="sidebar__logout" type="button" (click)="logout()">
      <span class="sidebar__icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path
            d="M10 17l5-5-5-5"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M15 12H3"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          />
          <path
            d="M21 4v16"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          />
        </svg>
      </span>
      <span class="sidebar__label" *ngIf="!collapsed">Log out</span>
    </button>
  </div>
</aside>

<section class="community-shell">
  <header class="community-shell__hero">
    <p class="community-shell__eyebrow">Community hub</p>
    <h1>Connect, post, and discuss inside the dashboard</h1>
    <p>
      Create photo posts, join the live group chat, or open a product thread
      without leaving the authenticated user layout.
    </p>
  </header>

  <nav class="community-shell__tabs">
    <button
      type="button"
      [class.active]="activeTab === 'feed'"
      (click)="setTab('feed')"
    >
      Feed
    </button>
    <button
      type="button"
      [class.active]="activeTab === 'chat'"
      (click)="setTab('chat')"
    >
      Group Chat
    </button>
    <button
      type="button"
      [class.active]="activeTab === 'discussions'"
      (click)="setTab('discussions')"
    >
      Product Discussions
    </button>
  </nav>

  <div class="community-shell__panel" [hidden]="activeTab !== 'feed'">
    <app-post-feed></app-post-feed>
  </div>

  <div class="community-shell__panel" [hidden]="activeTab !== 'chat'">
    <app-group-chat></app-group-chat>
  </div>

  <div class="community-shell__panel" [hidden]="activeTab !== 'discussions'">
    <app-product-discussion></app-product-discussion>
  </div>
</section>

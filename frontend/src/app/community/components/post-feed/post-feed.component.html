<section class="feed">
  <app-create-post (postCreated)="loadPosts()"></app-create-post>

  <div *ngIf="loading" class="feed__loading">Loading feed...</div>

  <div *ngIf="!loading && posts.length === 0" class="feed__empty">
    No posts yet. Be the first to share something.
  </div>

  <div class="feed__list" *ngIf="!loading && posts.length > 0">
    <app-post-card
      *ngFor="let post of posts"
      [post]="post"
      (removed)="removePost($event)"
    ></app-post-card>
  </div>
</section>

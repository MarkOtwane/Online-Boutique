<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Online Boutique Storefront</title>
  <desc id="desc">Illustration of a modern boutique storefront with mannequins and product displays.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#dbeafe" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)" />
  <rect x="180" y="190" width="840" height="540" rx="24" fill="#ffffff" stroke="#0f172a" stroke-width="6" />
  <rect x="250" y="260" width="280" height="360" fill="#eff6ff" />
  <rect x="670" y="260" width="280" height="360" fill="#eff6ff" />
  <circle cx="390" cy="430" r="70" fill="#93c5fd" />
  <circle cx="810" cy="430" r="70" fill="#60a5fa" />
  <rect x="535" y="260" width="130" height="260" fill="#1e3a8a" />
  <text x="600" y="160" text-anchor="middle" font-size="56" fill="#1e293b" font-family="Georgia, serif">ONLINE BOUTIQUE</text>
</svg>
